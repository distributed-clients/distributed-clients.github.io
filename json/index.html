<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Download</title>
</head>

<body>
  <script>
    const EMBEDDED_USERS = { "yeet": { "v": 1, "alg": "AES-256-CTR", "kdf": "PBKDF2-SHA256", "iterations": 310000, "salt": "YC63+D8F77R6aRmnCjeTUQ==", "iv": "m4jPskaPguZdqHHm6STHjQ==", "data": "pXQ0TNkhvfzGmoPld64irgzQ0XCYgHQ0iKTn1BflYmwHQjB+3WHzINFaGnoKQvu8qF8Gjd/I2kScJqxeId9t2gbmX9lixoAdSHCd7nU+aIMTM51WV6sCdA4rhv0G/4l9P6qbzGanQEYWPm99VWDgfNkg6VLQudbyvD42ff4gZTJl62hXxSTk4AVkVUqibWL4drTsCyZL7Um0Fku0ywYbpFBIJlFxBQaPTCXqSckqg80OyXLadODEpgGTCkwQvog+Lou13blaVro7FFqCLYOW0u35AA1qB7NnMZMPa5/kRbn74KzmKJc45LnA9N5ysQy4gBRKbTJbe4PwqJkYuAx/bZAFKzpHY6MYfDlxer++q/r0ncAwvjTeanAotYiLnLYPADtykeHCbu5F5TE4HSPNN0cQIgfkFc6vVAY7aX5HKJRAoEsYJXCaaE7V10hgZb9tt7vK2Ps9agfa8mCSgR9/v+CCTi8TymHMvxWafgmWhzPfZz0e84Pz/yg2Zl2kcY5nEpYW5BWoOfet9AlwKjs6NEc7oPAVOl0LZtLObb4YlUXFdqq12NWgY6lM563w0Ij/DwX4FMQX3mNAV1ySQAfjyi9+vUwDT1Z7EzU=", "filename": "yeet.json", "mimeType": "application/json" } };
    const DEFAULT_FILENAME = "encrypted.json";

    function downloadJsonObject(data, fileName) {
      const text = JSON.stringify(data, null, 2) + "\n";
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName || DEFAULT_FILENAME;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        user: (params.get("user") || "").trim(),
      };
    }

    async function processRequest(user, options = {}) {
      const isManual = Boolean(options.isManual);
      const payload = EMBEDDED_USERS && user ? EMBEDDED_USERS[user] : null;

      if (!payload) {
        downloadJsonObject({}, DEFAULT_FILENAME);
        return;
      }

      const outputFileName = isManual
        ? user + ".json"
        : user + ".encrypted.json";
      downloadJsonObject(payload, outputFileName);
    }

    async function run() {
      const { user } = getParams();
      if (user) {
        await processRequest(user, { isManual: false });
        return;
      }

      const input = window.prompt("Enter user:key") || "";
      const delimiterIndex = input.indexOf(":");
      const manualUser =
        delimiterIndex === -1 ? "" : input.slice(0, delimiterIndex).trim();
      await processRequest(manualUser, { isManual: true });
    }

    run();
  </script>
</body>

</html>
