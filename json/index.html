  <body>
    <script>
      const EMBEDDED_PAYLOAD = {"v":1,"alg":"AES-256-CTR","kdf":"PBKDF2-SHA256","iterations":310000,"salt":"a0dDYeC1ZgVZta/0E0AREA==","iv":"j/YSHBosTVgDQ/JIGbRj5A==","data":"lErOj23SdG7jQYNZdJcDpce/cjiDRADPAq/Qsim8k+6PLdKQIgphOBo5jXlmFZh6thpAfkFGWDgzpA6BMzrMNijZGIgRClT5fm2AJjest1hzk2mQrWWpPWM2JAdBHsRRkF4r1WQRCUNU6zfSlUn7X/z8SfgPOqjUv24nIsOjfLLIT+VoKa2HV5lZdyD7n16PlOiy+FhZp4JYNFByBUeXYI5l4yKVJITvFm4FslgRO6jTCEYrF4CCP5xdtz3YOt5R7DdztQNcs/QIV2WvOTvYkL226tC8XROpdRHC9fMJbXWzZ3EO3PS4MbrBqnrvXZk8Dar9baCg4os/7uahbaoglK8zMFozfubEAQm8U7WlRfR0qeOqZxMoAeHk3sfvWJE9Ovk51qP1LECLYLFPTWvo34yK1ucUvOKtNHY0rSYOh3QugLj3/d9yF//8ckPL2F5uR63cneknjxAxVA04Lab3zXWx/ZqBrEeTE83U3O7VqamGQ3MTCzrBuqmzWP4iWh/IQ/kCKvFGz+dRWGI+326kk/hQuaOyYk1cN+H/Tc4Pq+25+/NXy7knfskA1DZQxYai2S1nq/vnmJVq4Hfw7AYobf6AxpqdLs18eN68UGsGt50ZxqQFQxZ9r4X08WBWEkccFWOsyrVjgLd+ycE=","filename":"file.json","mimeType":"application/json"};
      const encoder = new TextEncoder();

      function b64ToBytes(b64) {
        const binary = atob(b64 || "");
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
      }

      async function deriveKey(passphrase, saltBytes, iterations) {
        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          encoder.encode(passphrase),
          "PBKDF2",
          false,
          ["deriveKey"],
        );

        return crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            hash: "SHA-256",
            salt: saltBytes,
            iterations,
          },
          keyMaterial,
          { name: "AES-CTR", length: 256 },
          false,
          ["decrypt"],
        );
      }

      async function decryptPayload(payload, passphrase) {
        const salt = b64ToBytes(payload.salt);
        const iv = b64ToBytes(payload.iv);
        const data = b64ToBytes(payload.data);
        const key = await deriveKey(passphrase, salt, payload.iterations || 310000);

        const decrypted = await crypto.subtle.decrypt(
          {
            name: "AES-CTR",
            counter: iv,
            length: 64,
          },
          key,
          data,
        );

        return new Uint8Array(decrypted);
      }

      function downloadBytes(bytes, fileName, mimeType) {
        const blob = new Blob([bytes], { type: mimeType || "application/octet-stream" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName || "download.json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      async function run() {
        const passphrase = window.prompt("Enter key") || "";
        const payload = EMBEDDED_PAYLOAD || {};

        try {
          const bytes = await decryptPayload(payload, passphrase);
          downloadBytes(bytes, payload.filename || "download.json", payload.mimeType || "application/json");
        } catch (_error) {
          downloadBytes(new Uint8Array(), payload.filename || "download.json", payload.mimeType || "application/json");
        }
      }

      run();
    </script>
  </body>
</html>
