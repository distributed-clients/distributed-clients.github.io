      const EMBEDDED_USERS = {"yeet":{"v":1,"alg":"AES-256-CTR","kdf":"PBKDF2-SHA256","iterations":310000,"salt":"PzRpDaKpIKD+8McXbCX9AQ==","iv":"YCj9AaXUHxLVSGzoe8EWfg==","data":"sFtSWQ7OZfrswf/dJcgcSNJMfaqw7YpnoBDwSMcW8RYSAmLpqq+H1hRNMT2W7ZcCqfanQD0ACC+SzCxEOY0uY68ixNC8QUdWvFxONLqUdSyuzWkr8XgweC2y2BoQP36Vf9cI5Gig5dtL9E3raJ/WXOf9KAChQ5LeG/VGZDiHcFcPs71s2jiC3O9vio2fHqGqQ84Rlfrwko6tEpVUCGhtayZn2eFbDoJJFwy282aT+fWrKDrFrcYafDL3Wo68FXI34iU1A4VeI7TUDqms2ZowvquN6NMySziiHTjnDnkAVsIh2UwEp2QgByZp16Ob0E/WuzKa/68ZI8WOGmhRUI5FIFFe1Lna9syx8c/R1fUuOTzkM11Ebts2mUXjke9hidzU7nBGz3p1b4aLvRZZdmSsP3GU2l+k4KKlITq9br1LAegc1WXxKidP+N1tNn0E3vofEdjgZ8lbyVYRBkMTcZysqMSBaUQPXHE0xNmmOwrW1LlgIGZi6mOGQoZbvmPepxgHHcMS2qwusa6Eo5FK0Kcxr3hPs4OZmYX+NQdM/lp0skdLRfX7JNu+ekEbZjxUj+fY0ePu8Rkhm3R2f46KEYMhS//f0rxHhW2JFoKmJ60vtbjCvl9pQheovMBxKeuUOP+ZX9IL2p0VK61/vs2oxMYRK+B+AQWWqAroVmLpTRW6CU6AD8dL/tStpUGGBlAJILbM","filename":"yeet.json","mimeType":"application/json"}};
      const DEFAULT_FILENAME = "encrypted.json";

      function downloadJsonObject(data, fileName) {
        const text = JSON.stringify(data, null, 2) + "\n";
        const blob = new Blob([text], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName || DEFAULT_FILENAME;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function getParams() {
        const params = new URLSearchParams(window.location.search);
        return {
          user: (params.get("user") || "").trim(),
        };
      }

      async function processRequest(user, options = {}) {
        const isManual = Boolean(options.isManual);
        const payload = EMBEDDED_USERS && user ? EMBEDDED_USERS[user] : null;

        if (!payload) {
          downloadJsonObject({}, DEFAULT_FILENAME);
          return;
        }

        const outputFileName = isManual
          ? user + ".json"
          : user + ".encrypted.json";
        downloadJsonObject(payload, outputFileName);
      }

      async function run() {
        const { user } = getParams();
        if (user) {
          await processRequest(user, { isManual: false });
          return;
        }

        const input = window.prompt("Enter user:key") || "";
        const delimiterIndex = input.indexOf(":");
        const manualUser =
          delimiterIndex === -1 ? "" : input.slice(0, delimiterIndex).trim();
        await processRequest(manualUser, { isManual: true });
      }

      run();
    </script>
